services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      SMTP_HOST: smtp
      SMTP_PORT: "1025"
      SMTP_ENABLED: "true"
    depends_on:
      - smtp

  smtp:
    image: mailhog/mailhog:latest
    container_name: task-smtp
    ports:
      - "1025:1025"
      - "8025:8025"
